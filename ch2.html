<!DOCTYPE html>

        body { background-color: #b71c1c !important; margin: 0 !important; padding: 0 !important; font-family: sans-serif; }

        .header { 
            background-color: #8e0000; color: white; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid #fff;
        }
        
        .grid { 
            display: grid !important; grid-template-columns: repeat(3, 1fr) !important;

        .item { 
            display: block !important; border: 3px solid #fff !important; 
            border-radius: 12px !important; overflow: hidden !important; 
            background: white !important; text-decoration: none;
        }

        .item img { 
            width: 100% !important; height: 120px !important; 
            object-fit: contain !important; background-color: white; display: block !important; 
        }
    </style>
</head>
