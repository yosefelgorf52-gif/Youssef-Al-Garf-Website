<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beIN Sports Low</title>
    <style>
        body { background-color: #b71c1c; margin: 0; padding: 15px; font-family: sans-serif; height: 100vh; }
        
        /* نظام الشبكة (عمودين) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* تصميم الأزرار */
        .btn {
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #8e0000;
            text-decoration: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .channel-name {
            color: #4a148c;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="grid-container">
    <!-- تأكد من مطابقة أسماء الصور المرفوعة على GitHub -->
    <a href="low1.html" class="btn">
        <img src="بن%20سبورت%201.png" alt="LOW 1">
        <div class="channel-name">LOW 1</div>
    </a>
    <a href="low2.html" class="btn">

        <div class="channel-name">LOW 2</div>

    <a href="low3.html" class="btn">

    <a href="low4.html" class="btn">

    </a>
    <a href="low5.html" class="btn">

        <div class="channel-name">LOW 5</div>
    </a>
    <a href="low6.html" class="btn">
        <img src="بن%20سبورت%206.png" alt="LOW 6">
        <div class="channel-name">LOW 6</div>
    </a>
</div>

</body>
</html>
