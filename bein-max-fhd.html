<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beIN Sports Max</title>
    <style>
        body { background-color: #b71c1c; margin: 0; padding: 10px; font-family: sans-serif; }
        
        /* نظام الشبكة لجعل الصور بجانب بعضها */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* عمودين */
            gap: 15px;
            padding-bottom: 20px;
        }

        /* تنسيق الزرار (الصورة) */
        .btn {
            background: #fff;
            padding: 10px;
            border-radius: 15px;
            border: 2px solid #8e0000;
            text-decoration: none;
            text-align: center;
        }

        .btn img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .channel-name {
            color: #4a148c;
            font-weight: bold;
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="grid-container">
    <!-- كل زرار يفتح ملف خاص -->
    <a href="bein1.html" class="btn">
        <img src="بن سبورت 1.png" alt="MAX 1">
        <div class="channel-name">MAX 1</div>
    </a>
    <a href="bein2.html" class="btn">
        <img src="بن سبورت 2.png" alt="MAX 2">
        <div class="channel-name">MAX 2</div>
    </a>
    <a href="bein3.html" class="btn">
        <img src="بن سبورت 3.png" alt="MAX 3">
        <div class="channel-name">MAX 3</div>
    </a>
    <a href="bein4.html" class="btn">
        <img src="بن سبورت 4.png" alt="MAX 4">
        <div class="channel-name">MAX 4</div>
    </a>
    <a href="bein5.html" class="btn">
        <img src="بن سبورت 5.png" alt="MAX 5">
        <div class="channel-name">MAX 5</div>
    </a>
    <a href="bein6.html" class="btn">
        <img src="بن سبورت 6.png" alt="MAX 6">
        <div class="channel-name">MAX 6</div>
    </a>
</div>

</body>
</html>
