<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مشاهدة رمضان 1</title>
    <style>
        body { background-color: #000; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* جعل الفيديو يملأ الشاشة بالكامل */
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        /* زر العودة المخفي بشكل أنيق فوق الفيديو */
        .back-btn { position: absolute; top: 10px; right: 10px; z-index: 10; 
                    background: rgba(183, 28, 28, 0.8); color: white; padding: 10px 20px; 
                    text-decoration: none; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <a href="series-ramadan.html" class="back-btn">← عودة</a>

    <video id="myVideo" controls autoplay playsinline>
        <source src="2026-07-12-225350298.mp4" type="video/mp4">
        متصفحك لا يدعم تشغيل الفيديو.
    </video>

    <script>
        // إجبار الفيديو على البدء فوراً
        const video = document.getElementById('myVideo');
        video.play().catch(error => {
            console.log("التشغيل التلقائي محظور، اضغط على الفيديو للبدء.");
        });

        // محاولة جعل الشاشة عريضة (تدوير)
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    </script>
</body>
</html>
