<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel 5</title>
    <style>
        /* شاشة ثابتة لا تتحرك */
        body { 
            background-color: #b71c1c; 
            margin: 0; 
            padding: 15px; 
            font-family: sans-serif; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* نظام الشبكة (عمودين) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* تصميم الزرار (صورة + نص) */
        .btn {
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #8e0000;
            text-decoration: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .channel-name {
            color: #4a148c;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="grid-container">
    <a href="link1.html" class="btn">
        <img src="بن%20سبورت%201.png" alt="Ch 1">
        <div class="channel-name">Ch 1</div>
    </a>
    <a href="link2.html" class="btn">
        <img src="بن%20سبورت%202.png" alt="Ch 2">
        <div class="channel-name">Ch 2</div>
    </a>
    <a href="link3.html" class="btn">
        <img src="بن%20سبورت%203.png" alt="Ch 3">
        <div class="channel-name">Ch 3</div>
    </a>
    <a href="link4.html" class="btn">
        <img src="بن%20سبورت%204.png" alt="Ch 4">
        <div class="channel-name">Ch 4</div>
    </a>
    <a href="link5.html" class="btn">
        <img src="بن%20سبورت%205.png" alt="Ch 5">
        <div class="channel-name">Ch 5</div>
    </a>
    <a href="link6.html" class="btn">
        <img src="بن%20سبورت%206.png" alt="Ch 6">
        <div class="channel-name">Ch 6</div>
    </a>
</div>

</body>
</html>
