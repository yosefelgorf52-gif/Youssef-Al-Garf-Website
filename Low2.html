<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل القنوات - يوسف الجرف</title>
    <style>
        body { background-color: #000; text-align: center; margin: 0; }
        #playerFrame { width: 100%; max-width: 800px; height: 450px; border: none; background: #222; }
        .btn { padding: 15px 30px; background: #b71c1c; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; display: block; margin: 20px auto; }
    </style>
</head>
<body>

    <!-- المشغل -->
    <iframe id="playerFrame" src="" allowfullscreen allow="autoplay"></iframe>

    <!-- زر التشغيل -->
    <button class="btn" onclick="loadChannel()">تشغيل أون تايم سبورت</button>

    <script>
        function loadChannel() {
            // هذا الرابط هو رابط المشغل المباشر المستخرج من الموقع
            var channelUrl = "https://online.aflam4you.org/embed.php?vid=on-time-sports-egypt-funding-tv_445";
            document.getElementById('playerFrame').src = channelUrl;
        }
    </script>
</body>
</html>
