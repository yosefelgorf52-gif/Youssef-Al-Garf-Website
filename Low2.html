<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل القنوات الرياضية</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #b71c1c; font-family: sans-serif; text-align: center; color: white; padding: 20px; }
        #video { width: 100%; max-width: 600px; background: #000; display: block; margin: 0 auto; }
        .btn { display: block; width: 90%; max-width: 400px; margin: 10px auto; background: white; color: #b71c1c; padding: 15px; border-radius: 10px; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>مشغل القنوات</h1>
    <video id="video" controls autoplay></video>
    <p>اختر قناة من القائمة أدناه:</p>
    
    <button class="btn" onclick="playStream('https://stream-url-here.m3u8')">تجربة قناة (ضع رابط m3u8 هنا)</button>

    <script>
        var video = document.getElementById('video');

        function playStream(url) {
            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                video.play();
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        }
    </script>
</body>
</html>
