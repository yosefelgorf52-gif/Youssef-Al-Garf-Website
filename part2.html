    /* هذا هو التعديل لثبات شريط البحث */
    #searchBar { 
        position: -webkit-sticky; /* للمتصفحات القديمة */
        position: sticky; 
        top: 0; /* التثبيت في أعلى الشاشة */
        z-index: 1000; /* لضمان أنه فوق كل شيء */

        background-color: white; /* خلفية بيضاء حتى لا يظهر ما تحته */
        box-shadow: 0 4px 6px rgba(0,0,0,0.3); /* ظل بسيط ليظهر بشكل أفضل */
    }

    .btn {

        width: 90%; 
        max-width: 400px; 
        margin: 10px auto; 
        background: white; 
        color: #b71c1c; 
        padding: 18px; 
        border-radius: 10px; 
        text-decoration: none;

    <script>
        function filter() {
            let val = document.getElementById('searchBar').value.toLowerCase();
            let btns = document.getElementsByClassName('btn');
            for (let b of btns) {
                if (b.innerText.toLowerCase().includes(val)) {
                    b.style.display = "block";
                } else {
                    b.style.display = "none";
                }
            }
        }
