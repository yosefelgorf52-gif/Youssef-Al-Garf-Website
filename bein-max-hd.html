<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beIN Sports HD</title>
    <style>
        body { background-color: #b71c1c; margin: 0; padding: 15px; font-family: sans-serif; height: 100vh; }
        
        /* تصميم الشبكة (عمودين متساويين) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* تصميم زرار القناة */
        .btn {
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #8e0000;
            text-decoration: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .channel-name {
            color: #4a148c;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="grid-container">
    <a href="hd1.html" class="btn">
        <img src="بن سبورت 1.png" alt="HD 1">
        <div class="channel-name">HD 1</div>
    </a>
    <a href="hd2.html" class="btn">
        <img src="بن سبورت 2.png" alt="HD 2">
        <div class="channel-name">HD 2</div>
    </a>
    <a href="hd3.html" class="btn">
        <img src="بن سبورت 3.png" alt="HD 3">
        <div class="channel-name">HD 3</div>
    </a>
    <a href="hd4.html" class="btn">
        <img src="بن سبورت 4.png" alt="HD 4">
        <div class="channel-name">HD 4</div>
    </a>
    <a href="hd5.html" class="btn">
        <img src="بن سبورت 5.png" alt="HD 5">
        <div class="channel-name">HD 5</div>
    </a>
    <a href="hd6.html" class="btn">
        <img src="بن سبورت 6.png" alt="HD 6">
        <div class="channel-name">HD 6</div>
    </a>
</div>

</body>
</html>
