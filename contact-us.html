<!DOCTYPE html>
<html lang="ar" dir="rtl" style="height: 100%; width: 100%; margin: 0; padding: 0;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الدعم الفني - يوسف الجرف TV</title>
    <style>
        body, html {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: #121212; /* لون داكن يتناسب مع التطبيق */
            overflow: hidden; /* لمنع الحركة */
        }
        /* إجبار إطار الشات على ملء الشاشة تماماً */
        .chat-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

<!-- نستخدم رابط الـ Smartsupp المباشر لعرض الشات كصفحة كاملة -->
<iframe 
    src="https://app.smartsupp.com/widget/886a99bd64c481440a2170020a04cebf7506ad97" 
    class="chat-frame"
    allow="microphone; camera; clipboard-write; display-capture">
</iframe>

<script>
    // للتأكد من أن الشات دائماً يغطي المساحة بالكامل
    window.addEventListener('resize', function() {
        document.body.style.height = window.innerHeight + 'px';
    });
</script>

</body>
</html>
