<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة القنوات</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        body { 
            background-color: #b71c1c; 
            margin: 0; 
            padding: 10px; 
            font-family: sans-serif;
        }
        
        /* تقسيم الشبكة لـ 3 أعمدة متساوية */
        .channel-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            max-width: 600px; 
            margin: 0 auto;
        }
        
        /* تصميم إطار القناة */
        .channel-item { 
            background: #ffffff; 
            padding: 6px; 
            border-radius: 8px; 
            border: 2px solid #8e0000; 
            display: block; 
            text-decoration: none;
            transition: transform 0.2s;
        }
        
        /* تأثير عند اللمس */
        .channel-item:active { transform: scale(0.95); }
        
        /* الصور داخل الشبكة */
        .channel-item img { 
            width: 100%; 
            height: 90px; 
            object-fit: cover; 
            border-radius: 4px; 
            display: block;
        }
    </style>
</head>
<body>
