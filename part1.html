    <script>
        function filter() {
            let val = document.getElementById('searchBar').value.toLowerCase();
            let btns = document.getElementsByClassName('btn');
            for (let b of btns) {
                if (b.innerText.toLowerCase().includes(val)) {
                    b.style.display = "block";
                } else {
                    b.style.display = "none";
                }
            }
        }
