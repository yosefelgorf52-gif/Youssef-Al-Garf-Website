        body { background-color: #b71c1c; margin: 0; padding: 10px; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .card {
            background: #fff;
            padding: 5px;
            border-radius: 10px;
            border: 2px solid #8e0000;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }
    </style>
</head>
