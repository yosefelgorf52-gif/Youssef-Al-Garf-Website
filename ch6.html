<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beIN Sports</title>
    <style>
        /* لجعل الشاشة ثابتة تماماً ومنع أي حركة */
        body { 
            background-color: #b71c1c; 
            margin: 0; 
            padding: 15px; 
            font-family: sans-serif; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* نظام الشبكة (عمودين) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* تصميم المربع (الصورة فقط) */
        .btn {
            background: #fff;
            padding: 5px;
            border-radius: 12px;
            border: 2px solid #8e0000;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .btn img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }
    </style>
</head>
<body>

<div class="grid-container">
    <a href="player1.html" class="btn"><img src="1000005806.png" alt="Channel 1"></a>
    <a href="player2.html" class="btn"><img src="1000005807.png" alt="Channel 2"></a>
    <a href="player3.html" class="btn"><img src="1000005808.png" alt="Channel 3"></a>
    <a href="player4.html" class="btn"><img src="1000005809.png" alt="Channel 4"></a>
    <a href="player5.html" class="btn"><img src="1000005810.png" alt="Channel 5"></a>
    <a href="player6.html" class="btn"><img src="1000005811.png" alt="Channel 6"></a>
    <a href="player7.html" class="btn"><img src="1000005812.png" alt="Channel 7"></a>
    <a href="player8.html" class="btn"><img src="1000005814.png" alt="Channel 8"></a>
    <a href="player9.html" class="btn"><img src="1000005815.png" alt="Channel 9"></a>
</div>

</body>
</html>
