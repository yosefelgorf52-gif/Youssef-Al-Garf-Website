<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beIN Sports</title>
    <style>
        body { 
            background-color: #b71c1c; 
            margin: 0; 
            padding: 10px; 
            font-family: sans-serif; 
            height: 100vh; 
        }
        
        /* تصميم الشبكة (3 أعمدة كما في صورتك) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        /* تصميم المربع */
        .card {
            background: #fff;
            padding: 5px;
            border-radius: 8px;
            border: 2px solid #8e0000;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
        }
    </style>
</head>
<body>

<div class="grid-container">
    <!-- استخدام أسماء الملفات التي رفعتها بالضبط -->
    <a href="player1.html" class="card"><img src="1 بن.png" alt="1"></a>
    <a href="player2.html" class="card"><img src="2 بن.png" alt="2"></a>
    <a href="player3.html" class="card"><img src="3 بن.png" alt="3"></a>
    <a href="player4.html" class="card"><img src="4 بن.png" alt="4"></a>
    <a href="player5.html" class="card"><img src="5 بن.png" alt="5"></a>
    <a href="player6.html" class="card"><img src="6 بن.png" alt="6"></a>
    <a href="player7.html" class="card"><img src="7 بن.png" alt="7"></a>
    <a href="player8.html" class="card"><img src="8 بن.png" alt="8"></a>
    <a href="player9.html" class="card"><img src="9 بن.png" alt="9"></a>
    <a href="player0.html" class="card"><img src="0 بن.png" alt="0"></a>
</div>

</body>
</html>
