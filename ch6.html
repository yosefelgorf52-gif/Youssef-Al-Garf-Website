<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beIN Sports</title>
    <style>
        body { background-color: #b71c1c; margin: 0; padding: 15px; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        /* تصميم الزرار الدائري (مثل الصورة الثانية) */
        .btn { 
            display: flex; align-items: center; background: #fff; 
            padding: 10px; margin-bottom: 12px; border-radius: 50px; 
            text-decoration: none; border: 2px solid #8e0000;
        }
        
        /* الصورة داخل الدائرة */
        .btn-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-left: 15px; }
        
        /* اسم القناة */
        .btn-text { color: #8e0000; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <a href="player1.html" class="btn">
        <img src="1 بن.png" class="btn-img"><span class="btn-text">beIN SPORTS 1</span>
    </a>
    <a href="player2.html" class="btn">
        <img src="2 بن.png" class="btn-img"><span class="btn-text">beIN SPORTS 2</span>
    </a>
    <a href="player3.html" class="btn">
        <img src="3 بن.png" class="btn-img"><span class="btn-text">beIN SPORTS 3</span>
    </a>
    <a href="player4.html" class="btn">
        <img src="4 بن.png" class="btn-img"><span class="btn-text">beIN SPORTS 4</span>
    </a>
    <a href="player5.html" class="btn">
        <img src="5 بن.png" class="btn-img"><span class="btn-text">beIN SPORTS 5</span>
    </a>
    <a href="player6.html" class="btn">
        <img src="6 بن.png" class="btn-img"><span class="btn-text">beIN SPORTS 6</span>
    </a>

</body>
</html>
