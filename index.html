<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>يوسف الجرف TV | تطبيق متكامل</title>
    <!-- مكتبة مشغل الفيديو -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --blue: #1a237e; --gold: #ffc107; }
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; }
        header { background: var(--blue); padding: 20px; text-align: center; border-bottom: 5px solid var(--gold); font-size: 1.5em; font-weight: bold; }
        .container { padding: 20px; }
        .btn { background: #263238; padding: 15px; margin-bottom: 10px; border-radius: 50px; border-right: 5px solid var(--gold); cursor: pointer; text-align: center; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #37474f; }
        #player-area { display: none; text-align: center; }
        video { width: 100%; max-width: 600px; border-radius: 10px; background: black; }
    </style>
</head>
<body>

<header>يوسف الجرف TV</header>

<!-- القائمة الرئيسية -->
<div id="menu" class="container">
    <div class="btn" onclick="playVideo('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 'قناة تجريبية 1')">قناة تجريبية 1 (شغالة)</div>
    <div class="btn" onclick="playVideo('https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8', 'قناة تجريبية 2')">قناة تجريبية 2 (شغالة)</div>
    <!-- هنا يمكنك إضافة مئات القنوات بنفس الطريقة -->
</div>

<!-- منطقة المشغل -->
<div id="player-area" class="container">
    <div class="btn" style="background:#b71c1c;" onclick="location.reload()">إغلاق الفيديو والعودة</div>
    <h2 id="channel-title"></h2>
    <video id="video" controls autoplay></video>
</div>

<script>
    function playVideo(url, title) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('player-area').style.display = 'block';
        document.getElementById('channel-title').innerText = title;
        
        var video = document.getElementById('video');
        var hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        video.play();
    }
</script>

</html>
