<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yousef El-Garf Pro</title>
    <style>
        :root { --primary: #e50914; --bg: #121212; --card: #1f1f1f; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }
        
        /* التصميم الهندسي للهيدر */
        .header { background: #000; padding: 25px; text-align: center; border-bottom: 4px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .header h1 { margin: 0; color: var(--primary); letter-spacing: 2px; }

        /* تقسيم الشبكة الهندسي */
        .container { padding: 15px; }
        .section { margin-top: 25px; }
        .section-title { font-size: 1.3rem; margin-bottom: 15px; display: flex; align-items: center; color: #ddd; }
        .section-title::before { content: "■"; color: var(--primary); margin-left: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; transition: 0.3s; border: 1px solid #333; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card a { color: #fff; text-decoration: none; font-weight: 600; display: block; }
        .icon { font-size: 24px; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>شبكة يوسف الجرف</h1>
    </div>

    <div class="container">
        <!-- قسم الرياضة -->
        <div class="section">
            <div class="section-title">البث الرياضي</div>
            <div class="grid">
                <div class="card"><a href="https://www.yallakora.com"><span class="icon">⚽</span>يلا كورة</a></div>
                <div class="card"><a href="https://www.yalla-shoot.com"><span class="icon">📺</span>يلا شوت</a></div>
                <div class="card"><a href="https://www.fifa.com"><span class="icon">🏆</span>فيفا</a></div>
            </div>
        </div>

        <!-- قسم السوشيال ميديا -->
        <div class="section">
            <div class="section-title">الخدمات الاجتماعية</div>
            <div class="grid">
                <div class="card"><a href="https://www.facebook.com"><span class="icon">👥</span>فيسبوك</a></div>
                <div class="card"><a href="https://www.instagram.com"><span class="icon">📸</span>إنستجرام</a></div>
                <div class="card"><a href="https://www.tiktok.com"><span class="icon">🎵</span>تيك توك</a></div>
            </div>
        </div>
    </div>

</body>
</html>
