<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>يوسف أشرف الجرف TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --red: #b71c1c; --white: #ffffff; }
        body { background: #f0f0f0; font-family: sans-serif; margin: 0; }
        header { background: var(--red); color: white; padding: 20px; text-align: center; font-size: 1.5em; font-weight: bold; border-bottom: 4px solid #8e0000; }
        .container { padding: 15px; }
        .btn { display: flex; align-items: center; justify-content: space-between; background: white; padding: 10px 20px; margin-bottom: 10px; border: 2px solid var(--red); border-radius: 50px; cursor: pointer; color: var(--red); font-weight: bold; }
        .icon { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--red); object-fit: cover; }
        #player-box { display: none; text-align: center; background: black; padding: 20px; }
        video { width: 100%; max-width: 600px; }
    </style>
</head>
<body>

<header>Yousef Ashraf Al-Jarf TV</header>

<div id="menu" class="container">
    <div class="btn" onclick="playLive('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 'بي ان سبورت ماكس 1')">
        <span>بي ان سبورت ماكس 1</span>
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e6/BeIN_Sports_logo.png" class="icon">
    </div>
    <div class="btn" onclick="playLive('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 'القنوات المصرية')">
        <span>القنوات المصرية</span>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Flag_of_Egypt.svg/1200px-Flag_of_Egypt.svg.png" class="icon">
    </div>
    <div class="btn" onclick="playLive('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 'باقة شاهد VIP')">
        <span>باقة شاهد VIP</span>
        <img src="https://static.shahid.mbc.net/v2/assets/shahid_logo.png" class="icon">
    </div>
    <div class="btn" onclick="playLive('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 'باقة Netflix')">
        <span>باقة Netflix</span>
        <img src="https://assets.nflxext.com/us/ffe/siteui/common/icons/nficon2016.ico" class="icon">
    </div>
</div>

<div id="player-box">
    <div class="btn" onclick="location.reload()">إغلاق البث والعودة</div>
    <h2 id="ch-name" style="color:white;"></h2>
    <video id="video" controls autoplay></video>
</div>

<script>
    function playLive(url, name) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('player-box').style.display = 'block';
        document.getElementById('ch-name').innerText = name;
        var video = document.getElementById('video');
        var hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        video.play();
    }
</script>
