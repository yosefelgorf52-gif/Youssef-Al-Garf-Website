<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة يوسف الجرف - عالم الدراما</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { background: #b71c1c; padding: 20px; text-align: center; border-bottom: 5px solid #000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 8px; text-align: center; border: 1px solid #333; transition: 0.3s; }
        .card img { width: 100%; height: 220px; border-radius: 8px 8px 0 0; }
        .card:hover { border-color: #b71c1c; transform: scale(1.03); }
        .info { padding: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>منصة يوسف الجرف</h1></header>
    <div class="grid" id="content"></div>
    <script>
        // هنا سيقرأ الموقع الأفلام التي تضيفها من لوحة التحكم
        fetch('movies.json').then(r => r.json()).then(data => {
            document.getElementById('content').innerHTML = data.map(m => `
                <div class="card">
                    <img src="${m.image}" alt="${m.title}">
                    <div class="info">${m.title}</div>
                    <a href="${m.link}" style="color:red;">مشاهدة الآن</a>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
