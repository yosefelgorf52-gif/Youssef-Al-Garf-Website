<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تطبيق مُشاهِد - النسخة المبتكرة</title>
    <style>
        :root {
            --primary: #1a237e; /* أزرق ملكي */
            --accent: #ffc107;  /* ذهبي */
            --bg: #f4f7f6;
        }
        body { background-color: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        
        /* الهيدر بتصميم متدرج */
        header { 
            background: linear-gradient(135deg, var(--primary), #303f9f); 
            color: white; padding: 25px; text-align: center; 
            font-size: 1.5em; font-weight: bold; border-bottom: 5px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .container { padding: 20px; }

        /* الأزرار بتصميم "كروت عصرية" */
        .btn { 
            display: flex; justify-content: space-between; align-items: center; 
            background: white; padding: 18px 25px; margin-bottom: 15px; 
            border-right: 8px solid var(--accent); /* لمسة ذهبية جانبية */
            border-radius: 15px; text-decoration: none; color: var(--primary); 
            font-weight: bold; font-size: 1.1em; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .btn:hover { background-color: #e8eaf6; transform: translateX(-5px); }

        .icon { width: 50px; height: 50px; border-radius: 12px; background: #e8eaf6; border: 2px solid var(--accent); }
        .page { display: none; }
        .active { display: block; }
        
        /* زر المحادثة العائم */
        #chat-btn { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: var(--primary); width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<header id="header">مُشاهِد - الرئ</header>

<div id="home" class="page active container">
    <div class="btn" onclick="openPage('live')"><span>سيرفر البث المباشر</span><div class="icon"></div></div>
    <div class="btn"><span>مسلسلات رمضان</span><div class="icon"></div></div>
    <div class="btn"><span>أفلام عالمية</span><div class="icon"></div></div>
    <div class="btn"><span>قنوات الأطفال</span><div class="icon"></div></div>
</div>

<div id="live" class="page container">
    <div class="btn" onclick="openPage('home')" style="background:#e8eaf6;"><span>⬅️ العودة للرئيسية</span></div>
    <div class="btn"><span>بي ان سبورت ماكس 1</span><div class="icon"></div></div>
    <div class="btn"><span>بي ان سبورت ماكس 5 (جودة 5)</span><div class="icon"></div></div>
    <div class="btn"><span>القنوات المصرية</span><div class="icon"></div></div>
    <div class="btn"><span>القنوات الجزائرية</span><div class="icon"></div></div>
    <div class="btn"><span>باقة Netflix</span><div class="icon"></div></div>
    <div class="btn"><span>المصارعة الحرة</span><div class="icon"></div></div>
</div>

<div id="chat-btn" onclick="startChat()">💬</div>

<script>
    function openPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('header').innerText = (pageId === 'home') ? 'مُشاهِد - الرئيسية' : 'سيرفر البث المباشر';
    }
    
    // كود Tawk.to (غير الرابط برابطك الخاص)
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
    var s1=document.createElement("script");
    s1.src='https://embed.tawk.to/YOUR_ID_HERE/default';
    s1.async=true;
    document.body.appendChild(s1);
    })();
</script>

</body>
</html>
