<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يوسف الجرف TV</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f2f2f2; }
        
        /* شاشة التحميل (اللوجو الثابت والدوران) */
        #splash { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .logo-circle { width: 140px; height: 140px; background: #b71c1c; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 16px; text-align: center; padding: 10px; }
        .loader { margin-top: 30px; border: 4px solid #f3f3f3; border-top: 4px solid #b71c1c; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* الهيدر */
        header { background: #b71c1c; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .menu-icon { font-size: 25px; cursor: pointer; }

        /* الأزرار (نفس الشكل المطلوب) */
        .btn-list { padding: 10px; }
        .btn { display: flex; align-items: center; justify-content: flex-end; background: white; margin-bottom: 8px; padding: 10px; border: 2px solid #b71c1c; border-radius: 10px; text-decoration: none; color: #b71c1c; font-weight: bold; }
        .btn-icon { width: 40px; height: 40px; background: #b71c1c; border-radius: 50%; margin-left: 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-circle">يوسف الجرف TV</div>
    <div class="loader"></div>
</div>

<header>
    <div class="menu-icon">☰</div>
    <div>يوسف الجرف TV</div>
    <div>🌙</div>
</header>

<div class="btn-list">
    <a href="server-live.html" class="btn">سيرفر البث الرئيسي <div class="btn-icon">📺</div></a>
    <a href="world-cup.html" class="btn">كأس العالم 2026 <div class="btn-icon">⚽</div></a>
    <a href="series-ar.html" class="btn">المسلسلات العربية <div class="btn-icon">🎬</div></a>
    <a href="ramadan.html" class="btn">مسلسلات رمضان 2026 <div class="btn-icon">🌙</div></a>
    <a href="movies-ar.html" class="btn">الأفلام العربية <div class="btn-icon">🎥</div></a>
    <a href="movies-en.html" class="btn">الأفلام الأجنبية <div class="btn-icon">🍿</div></a>

    <a href="series-en.html" class="btn">المسلسلات الأجنبية <div class="btn-icon">🌍</div></a>
    <a href="wwe.html" class="btn">المصارعة الحرة <div class="btn-icon">🤼</div></a>
    <a href="plays.html" class="btn">مسرحيات <div class="btn-icon">🎭</div></a>
</div>

<script>
    // إخفاء اللوجو بعد ثانيتين
    window.onload = () => { setTimeout(() => document.getElementById('splash').style.display = 'none', 2000); };
</script>
</body>
</html>
